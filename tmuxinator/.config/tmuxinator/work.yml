# ~/.tmuxinator/work.yml

name: code-work
root: ~/repos/ADO-projects/AKS

windows:
  - automation:
      layout: even-horizontal
      panes:
        - terraform-modules:
            - cd ~/repos/ADO-projects/AKS/TerraformModules/
        - automation:
            - cd ~/repos/ADO-projects/AKS/Automation/
  - k8s-platform:
      layout: even-horizontal
      panes:
        - k8s-platform:
            - cd ~/repos/ADO-projects/AKS/kubernetes-platform/
  - ADO-repos:
      layout: even-horizontal
      panes:
        - images:
            - cd ~/repos/ADO-projects/AKS/
  - repos:
      layout: even-horizontal
      panes:
        - images:
            - cd ~/repos/
